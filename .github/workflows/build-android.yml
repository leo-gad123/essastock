name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build React app
        run: npm run build
      
      - name: Install Capacitor and build APK
        run: |
          # Install Capacitor
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # Remove existing config if it exists (to avoid TS/JSON conflict)
          rm -f capacitor.config.ts capacitor.config.js
          
          # Initialize Capacitor (this creates capacitor.config.json)
          npx cap init stockNova com.stocknova.app --web-dir=build
          
          # Add Android platform
          npx cap add android
          
          # Sync the project
          npx cap sync
          
          # Build the APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stocknova-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7